<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0a3d62" />
  <title>Panini WC26</title>
  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" href="./icons/icon-192.png" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="title">Panini WC26</div>
    <div class="stats" id="stats">— / 994 • Dubluri: 0</div>
  </header>

  <main>
    <section id="tab-album" class="tab active"></section>
    <section id="tab-dupes" class="tab"></section>
    <section id="tab-missing" class="tab"></section>
    <section id="tab-collection" class="tab"></section>
    <section id="tab-matches" class="tab"></section>
    <section id="tab-stats" class="tab"></section>
    <section id="tab-settings" class="tab"></section>
  </main>

  <nav class="bottom-nav">
    <button class="nav-btn active" data-tab="album">📋<span>Album</span></button>
    <button class="nav-btn" data-tab="dupes">🔁<span>Dubluri</span></button>
    <button class="nav-btn" data-tab="missing">❌<span>Lipsă</span></button>
    <button class="nav-btn" data-tab="collection">🖼️<span>Colecția</span></button>
    <button class="nav-btn" data-tab="matches">📅<span>Meciuri</span></button>
    <button class="nav-btn" data-tab="stats">📊<span>Statistici</span></button>
    <button class="nav-btn" data-tab="settings">⚙️<span>Setări</span></button>
  </nav>

  <div id="toast" class="toast"></div>

  <div id="preview-modal" class="preview-modal" hidden>
    <div class="preview-backdrop"></div>
    <div class="preview-card">
      <button class="preview-close" type="button" aria-label="Închide">✕</button>
      <div class="preview-image-wrap">
        <img id="preview-img" alt="" />
        <div id="preview-placeholder" class="preview-placeholder" hidden></div>
      </div>
      <div class="preview-meta">
        <div id="preview-code" class="preview-code"></div>
        <div id="preview-name" class="preview-name"></div>
        <div id="preview-state" class="preview-state"></div>
      </div>
    </div>
  </div>

  <script src="./vendor/exceljs.min.js"></script>
  <script src="./vendor/jspdf.umd.min.js"></script>
  <script src="./vendor/jspdf.plugin.autotable.min.js"></script>
  <script src="./app.js"></script>
  <script src="./export.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").catch(console.error);
      });
    }
  </script>
</body>
</html>
